name: Deploy

on:
  push:
    branches: [main]
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy-testnet:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli --features opt

      - name: Build and optimize verifier WASM
        working-directory: contracts/verifier
        run: |
          cargo build --target wasm32-unknown-unknown --release
          stellar contract optimize \
            --wasm target/wasm32-unknown-unknown/release/verifier.wasm \
            --wasm-out target/wasm32-unknown-unknown/release/verifier.optimized.wasm

      - name: Deploy to testnet
        run: |
          VERIFIER_CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/verifier/target/wasm32-unknown-unknown/release/verifier.optimized.wasm \
            --source-account "${{ secrets.DEPLOYER_SECRET_KEY }}" \
            --network testnet)
          echo "VERIFIER_CONTRACT_ID=$VERIFIER_CONTRACT_ID" >> $GITHUB_ENV

      - name: Run E2E tests
        run: bash scripts/test-e2e.sh
        env:
          API_URL: https://soroban-testnet.stellar.org

      - name: Comment contract ID on commit
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ Contract deployed to **testnet**\n\nContract ID: \`${{ env.VERIFIER_CONTRACT_ID }}\`\n\nExplorer: https://stellar.expert/explorer/testnet/contract/${{ env.VERIFIER_CONTRACT_ID }}`
            })

  deploy-mainnet:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli --features opt

      - name: Build and optimize verifier WASM
        working-directory: contracts/verifier
        run: |
          cargo build --target wasm32-unknown-unknown --release
          stellar contract optimize \
            --wasm target/wasm32-unknown-unknown/release/verifier.wasm \
            --wasm-out target/wasm32-unknown-unknown/release/verifier.optimized.wasm

      - name: Deploy to mainnet
        run: |
          VERIFIER_CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/verifier/target/wasm32-unknown-unknown/release/verifier.optimized.wasm \
            --source-account "${{ secrets.DEPLOYER_SECRET_KEY }}" \
            --network mainnet)
          echo "VERIFIER_CONTRACT_ID=$VERIFIER_CONTRACT_ID" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: "Release ${{ github.ref_name }} — mainnet deployment"
          tag_name: ${{ github.ref_name }}
